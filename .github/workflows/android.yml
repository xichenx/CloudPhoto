# CloudPhoto — Android (Compose + shared Android target)
# Trigger: manual only (Actions → Android → Run workflow).
name: Android

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: assembleDebug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build composeApp Debug
        run: ./gradlew :composeApp:assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK (test install)
        uses: actions/upload-artifact@v4
        with:
          name: cloudphoto-android-debug
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

# CloudPhoto — iOS (Shared.framework + SwiftUI / Xcode)
#
# Artifacts: built for iphonesimulator only. The uploaded .app installs on the iOS Simulator
# on a Mac, not on physical devices. Device builds need iphoneos + code signing / provisioning
# or distribution (e.g. TestFlight).
#
# Requires Xcode 16+ (iosApp.xcodeproj uses objectVersion 77). Use macos-15+, not macos-14 (Xcode 15).
#
# Trigger: manual only (Actions → iOS → Run workflow).
name: iOS

on:
  workflow_dispatch:

# `actions: write` is required for actions/upload-artifact. A permissions block denies
# anything not listed, so contents:read alone prevents uploads.
permissions:
  contents: read
  actions: write

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Kotlin framework + Xcode
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('iosApp/**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Shared.framework (iOS Simulator / Debug)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 -PXCODE_CONFIGURATION=DEBUG --no-daemon --stacktrace

      - name: Build iosApp with Xcode
        env:
          OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED: "YES"
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "${GITHUB_WORKSPACE}/ios-derived" \
            -clonedSourcePackagesDirPath "${GITHUB_WORKSPACE}/.spm-cache" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM= \
            build

      # Simulator-only: install via Simulator on a Mac (e.g. simctl install). Not for physical devices.
      - name: Upload Simulator .app (simulator-only; not for physical devices)
        uses: actions/upload-artifact@v4
        with:
          name: cloudphoto-ios-simulator-debug
          path: ios-derived/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: error
